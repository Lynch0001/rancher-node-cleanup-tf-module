apiVersion: apps/v1
kind: Deployment
metadata:
  name: rancher-node-cleaner
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: rancher-node-cleaner
  template:
    metadata:
      labels:
        app: rancher-node-cleaner
    spec:
      {{- if .Values.image.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml .Values.imagePullSecrets | nindent 6 }}
      {{- end }}
      serviceAccountName: cleaner-sa
      containers:
        - name: cleaner
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: rancher-api
            - configMapRef:
                name: cleaner-config
          env:
            - name: LEASE_NAME
              value: "rancher-node-cleaner"
            - name: LEASE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: STATE_CONFIGMAP
              value: "cleaner-state"
            {{- if and .Values.secrets.caCerts.enabled .Values.secrets.caCerts.certs }}
            - name: REQUESTS_CA_BUNDLE
              value: "/etc/ssl/custom/ca-certificates.crt"
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 8 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          {{- if and .Values.secrets.caCerts.enabled .Values.secrets.caCerts.certs }}
          volumeMounts:
            - name: ca-secret
              mountPath: /etc/ssl/custom/ca-certificates.crt
              subPath: ca-certificates.crt
              readOnly: true
          {{- end }}
      {{- if and .Values.secrets.caCerts.enabled .Values.secrets.caCerts.certs }}
      volumes:
        - name: ca-secret
          secret:
            secretName: ca-secret
      {{- end }}