{{- if .Values.secrets.rancher.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: rancher-node-cleaner
  namespace: {{ .Values.namespace }}
type: Opaque
data:
  RANCHER_URL: {{ .Values.config.rancher.url | quote}}
  RANCHER_TOKEN: {{ .Values.config.rancher.token | quote}}
  CLUSTER_ID: {{ .Values.config.rancher.clusterId | quote}}
  AWS_REGION: {{ .Values.config.rancher.awsRegion | quote}}
{{- end }}